# Disable libcamera monitor - make it a no-op to prevent crash
# Camera is provided via v4l2loopback + icamerasrc instead
wireplumber.components.rules = [
  {
    matches = [
      {
        name = "monitors/libcamera/enumerate-device.lua"
      }
    ]
    actions = {
      override = {
        name = /dev/null, type = script/lua
      }
    }
  }
]
