# Hide raw IPU7 V4L2 devices from PipeWire - they are internal ISP nodes
# Camera is provided via v4l2loopback + icamerasrc instead
monitor.v4l2.rules = [
  {
    matches = [
      {
        device.bus-path = "pci-0000:00:05.0"
      }
    ]
    actions = {
      update-props = {
        device.disabled = true
      }
    }
  }
]
